name: audio_transcription
description: Transcribe speech from audio files or streams into text.
category: multimodal

input_schema:
  type: object
  properties:
    audio_source:
      type: string
      description: URL or base64-encoded audio data
    language:
      type: string
      description: BCP-47 language code for the spoken language (e.g., "en-US", "fr-FR")
      default: en-US
    include_timestamps:
      type: boolean
      description: Whether to include word-level or segment-level timestamps
      default: false
    speaker_diarization:
      type: boolean
      description: Whether to identify and separate different speakers
      default: false
  required:
    - audio_source

output_schema:
  type: object
  properties:
    transcript:
      type: string
      description: The full transcribed text
    segments:
      type: array
      items:
        type: object
        properties:
          start_ms:
            type: integer
          end_ms:
            type: integer
          text:
            type: string
          speaker:
            type: string
      description: Time-stamped transcript segments (when include_timestamps is true)
    language_detected:
      type: string
      description: The language detected in the audio

compatible_platforms:
  - gemini
