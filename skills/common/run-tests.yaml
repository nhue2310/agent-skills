name: run_tests
description: Run a test suite or individual tests in the project.
category: code_operations

input_schema:
  type: object
  properties:
    test_command:
      type: string
      description: The command to run tests (e.g., "pytest", "npm test", "go test ./...")
    test_path:
      type: string
      description: Specific test file or directory to run (optional)
    test_filter:
      type: string
      description: Filter to run specific test cases by name pattern
    verbose:
      type: boolean
      description: Enable verbose test output
      default: false
    timeout:
      type: integer
      description: Maximum execution time in seconds
      default: 120
  required:
    - test_command

output_schema:
  type: object
  properties:
    passed:
      type: integer
      description: Number of tests passed
    failed:
      type: integer
      description: Number of tests failed
    skipped:
      type: integer
      description: Number of tests skipped
    total:
      type: integer
      description: Total number of tests
    exit_code:
      type: integer
    output:
      type: string
      description: Full test output

compatible_platforms:
  - codex
  - gemini
